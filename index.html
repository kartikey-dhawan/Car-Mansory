<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Explorer | Discover Premium Vehicles</title>
  <meta name="description" content="Browse, search, filter, and sort your favorite cars.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo">
        <h1>Car<span>Explorer</span></h1>
      </div>
      <div class="header-actions">
        <button id="view-favorites-btn" class="btn btn-outline" aria-label="View Favorites">
          Favorites (<span id="fav-count">0</span>)
        </button>
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg id="sun-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls glass-panel">
      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="search-input" placeholder="Search by name or brand...">
      </div>
      
      <div class="filters">
        <div class="select-wrap">
          <select id="brand-filter" aria-label="Filter by brand">
            <option value="all">All Brands</option>
          </select>
        </div>
        
        <div class="select-wrap">
          <select id="year-filter" aria-label="Filter by year">
            <option value="all">All Years</option>
          </select>
        </div>

        <div class="select-wrap">
          <select id="sort-select" aria-label="Sort cars">
            <option value="default">Sort By</option>
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
            <option value="year-desc">Newest First</option>
            <option value="year-asc">Oldest First</option>
          </select>
        </div>
      </div>
    </section>

    <div id="loading" class="loader-container">
      <div class="spinner"></div>
      <p>Loading premium cars...</p>
    </div>

    <div id="error-message" class="error-msg hidden"></div>

    <section id="car-grid" class="grid"></section>
    
    <div id="no-results" class="hidden no-results">
        <h3>No cars found</h3>
        <p>Try adjusting your search or filters.</p>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
